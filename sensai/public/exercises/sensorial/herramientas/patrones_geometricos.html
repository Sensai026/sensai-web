<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patrones de Orden - Regulación Sensorial</title>
    <link rel="stylesheet" href="../css/sensorial_global.css">
    <script src="../js/audio_sintetizador.js"></script>
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #E0F2FE 0%, #F0FDF4 50%, #FAF5FF 100%);
            position: relative;
            margin: 0;
            padding: 0;
            color: #1E293B;
            width: 100vw;
            height: 100vh;
            user-select: none; 
            -webkit-touch-callout: none;
        }

        canvas {
            display: block;
            cursor: pointer;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            width: 100vw;
            height: 100vh;
        }

        .progress-indicator {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(30, 41, 59, 0.1);
            border-radius: 20px;
            padding: 8px 16px;
            font-family: 'Quicksand', sans-serif;
            font-size: clamp(0.8rem, 2vw, 1rem);
            color: #1E293B;
            z-index: 10;
            max-width: 90%;
            text-align: center;
            white-space: nowrap;
        }

        .header-titulo {
            font-family: 'Outfit', sans-serif;
            color: #1E293B;
            position: absolute;
            top: clamp(20px, 4vh, 30px);
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(1.2rem, 3vw, 2rem);
            font-weight: 600;
            text-align: center;
            z-index: 10;
            margin: 0;
            max-width: 90%;
        }

        .barra-controles-delgada {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
            background: transparent !important;
            padding: 0;
            border: none !important;
            border-radius: 0;
            backdrop-filter: none;
            box-shadow: none;
            z-index: 1000;
            will-change: transform;
            max-width: 90vw;
        }

        .control-btn-delgado {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(4px, 1vw, 8px);
            padding: clamp(8px, 2vh, 12px) clamp(12px, 3vw, 16px);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(30, 41, 59, 0.1);
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            font-size: clamp(0.8rem, 2vw, 0.9rem);
            color: #1E293B;
            transition: all 0.3s ease;
            white-space: nowrap;
            min-height: 44px;
            min-width: 44px;
            touch-action: manipulation;
        }

        .control-btn-delgado:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        .control-btn-delgado.active {
            background: #000000;
            color: white;
        }

        .control-btn-delgado span:first-child {
            font-size: 1.1rem;
        }

        .axes-selector {
            display: flex;
            gap: 12px;
            padding: 0;
            background: transparent !important;
            border: none !important;
            border-radius: 0;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .axis-btn {
            padding: clamp(6px, 1.5vh, 10px) clamp(8px, 2vw, 12px);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(30, 41, 59, 0.2);
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            font-size: clamp(0.8rem, 2vw, 0.9rem);
            color: #1E293B;
            transition: all 0.3s ease;
            min-width: 44px;
            min-height: 44px;
            text-align: center;
            touch-action: manipulation;
        }

        .axis-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        .axis-btn.active {
            background: #000000 !important;
            color: white !important;
            opacity: 1 !important;
            font-weight: 600;
            transform: scale(1.05);
        }

        .shape-selector {
            display: flex;
            gap: 12px;
            padding: 0;
            background: transparent !important;
            border: none !important;
            border-radius: 0;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .shape-btn {
            padding: clamp(6px, 1.5vh, 10px) clamp(8px, 2vw, 12px);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(30, 41, 59, 0.2);
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            font-size: clamp(0.8rem, 2vw, 0.9rem);
            color: #1E293B;
            transition: all 0.3s ease;
            min-width: 44px;
            min-height: 44px;
            text-align: center;
            touch-action: manipulation;
        }

        .shape-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        .shape-btn.active {
            background: #000000 !important;
            color: white !important;
            opacity: 1 !important;
            font-weight: 600;
            transform: scale(1.05);
        }
    </style>
</head>
<body oncontextmenu="return false;" style="user-select: none; -webkit-touch-callout: none;">
    <!-- Botón de Regreso -->
    <a href="#" class="back-button" id="backButton" title="Volver al menú">
        ←
    </a>

    <!-- Indicador de Progreso Minimalista -->
    <div class="progress-indicator" id="progressIndicator">
        <span id="figureCount">0</span> figuras
    </div>

    <!-- Título de la Herramienta -->
    <h1 class="header-titulo">🔷 Patrones de Orden</h1>

    <!-- Barra de Controles Inferior -->
    <div class="barra-controles-delgada">
        <div class="axes-selector">
            <button class="axis-btn active" data-axes="8">8</button>
            <button class="axis-btn" data-axes="12">12</button>
            <button class="axis-btn" data-axes="16">16</button>
            <button class="axis-btn" data-axes="24">24</button>
        </div>
        <div class="shape-selector">
            <button class="shape-btn active" data-shape="circle">⭕ Círculo</button>
            <button class="shape-btn" data-shape="triangle">🔺 Triángulo</button>
            <button class="shape-btn" data-shape="square">⬜ Cuadrado</button>
            <button class="shape-btn" data-shape="pentagon">⬠ Pentágono</button>
            <button class="shape-btn" data-shape="hexagon">⬡ Hexágono</button>
        </div>
        <button class="control-btn-delgado" id="clearBtn">
            <span>🧹</span>
            <span>Limpiar</span>
        </button>
        <button class="control-btn-delgado" id="soundToggle">
            <span>🔊</span>
            <span>Sonido ON</span>
        </button>
    </div>

    <!-- Área Interactiva -->
    <canvas id="patternsCanvas" class="area-interactiva-maximizada"></canvas>

    <script src="../js/audio_sintetizador.js"></script>
    <script>
        // Bloqueo de menús del navegador para inmersión total
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.body.style.userSelect = 'none';
        document.body.style.webkitTouchCallout = 'none';
        
        // Ajuste de pantalla responsivo
        function resizeCanvas() {
            const canvas = document.getElementById('patternsCanvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', resizeCanvas);
        
        // Inicializar canvas responsivo
        resizeCanvas();
        
        class PatronesGeometricos {
            constructor() {
                this.canvas = document.getElementById('patternsCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.soundEnabled = true;
                
                // Pattern properties
                this.centerX = 0;
                this.centerY = 0;
                this.guidelines = [];
                this.figures = [];
                this.selectedShape = 'circle';
                this.numAxes = 8;
                this.isFading = false;
                this.fadeProgress = 0;
                this.fadeOutFigures = [];
                
                // Audio
                this.audioContext = null;
                
                this.init();
            }

            init() {
                this.resizeCanvas();
                this.setupEventListeners();
                this.initAudio();
                this.generateGuidelines();
                this.animate();
            }

            resizeCanvas() {
                const oldWidth = this.canvas.width;
                const oldHeight = this.canvas.height;
                const oldCenterX = this.centerX;
                const oldCenterY = this.centerY;
                
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                
                // Update center
                this.centerX = this.canvas.width / 2;
                this.centerY = this.canvas.height / 2;
                
                // Recenter existing elements when canvas resizes
                if (oldWidth > 0 && oldHeight > 0) {
                    const scaleX = this.canvas.width / oldWidth;
                    const scaleY = this.canvas.height / oldHeight;
                    
                    for (const figure of this.figures) {
                        figure.x = this.centerX + (figure.x - oldCenterX) * scaleX;
                        figure.y = this.centerY + (figure.y - oldCenterY) * scaleY;
                    }
                }
                
                // Regenerate guidelines for new canvas size
                this.generateGuidelines();
            }

            setupEventListeners() {
                // Canvas events
                this.canvas.addEventListener('mousedown', (e) => this.handleClick(e));
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const rect = this.canvas.getBoundingClientRect();
                    const mouseEvent = new MouseEvent('mousedown', {
                        clientX: touch.clientX,
                        clientY: touch.clientY
                    });
                    this.handleClick(mouseEvent);
                });

                // Control buttons
                document.querySelectorAll('.axis-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.selectAxes(parseInt(e.target.dataset.axes));
                        
                        // Update active state
                        document.querySelectorAll('.axis-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                    });
                });

                // Shape selector
                document.querySelectorAll('.shape-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.selectShape(e.target.dataset.shape);
                        
                        // Update active state
                        document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                    });
                });

                // Clear button
                document.getElementById('clearBtn').addEventListener('click', () => this.clear());
                
                // Sound toggle
                document.getElementById('soundToggle').addEventListener('click', () => {
                    this.toggleSound();
                });

                // Back button
                document.getElementById('backButton').addEventListener('click', () => {
                    window.location.href = '../menu_sensorial.html';
                });

                // Window resize
                window.addEventListener('resize', () => this.resizeCanvas());
            }

            selectAxes(numAxes) {
                this.numAxes = numAxes;
                this.generateGuidelines();
            }

            generateGuidelines() {
                this.guidelines = [];
                const angleStep = (2 * Math.PI) / this.numAxes;
                
                // Calculate maximum distance to reach actual screen edges
                // Use the larger dimension to ensure lines reach corners
                const canvasDiagonal = Math.sqrt(Math.pow(this.canvas.width, 2) + Math.pow(this.canvas.height, 2));
                const maxDistance = canvasDiagonal / 2; // Half diagonal reaches all corners
                
                for (let i = 0; i < this.numAxes; i++) {
                    const angle = i * angleStep;
                    this.guidelines.push({
                        angle: angle,
                        endX: this.centerX + Math.cos(angle) * maxDistance,
                        endY: this.centerY + Math.sin(angle) * maxDistance,
                        maxDistance: maxDistance
                    });
                }
            }

            selectShape(shape) {
                this.selectedShape = shape;
            }

            handleClick(e) {
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                // Find nearest guideline
                const nearestGuideline = this.findNearestGuideline(x, y);
                
                if (nearestGuideline) {
                    // Calculate distance from center
                    const distance = Math.sqrt(
                        Math.pow(x - this.centerX, 2) + 
                        Math.pow(y - this.centerY, 2)
                    );
                    
                    // Create symmetric pattern
                    this.createSymmetricPattern(distance);
                    
                    // Play sound with distance-based frequency
                    this.playClickSound(distance);
                }
            }

            findNearestGuideline(x, y) {
                let nearest = null;
                let minDistance = Infinity;
                const tolerance = 50; // Increased tolerance for better detection
                
                for (const guideline of this.guidelines) {
                    const distance = this.pointToLineDistance(
                        x, y,
                        this.centerX, this.centerY,
                        guideline.endX, guideline.endY
                    );
                    
                    if (distance < minDistance && distance < tolerance) {
                        minDistance = distance;
                        nearest = guideline;
                    }
                }
                
                return nearest;
            }

            pointToLineDistance(px, py, x1, y1, x2, y2) {
                const A = px - x1;
                const B = py - y1;
                const C = x2 - x1;
                const D = y2 - y1;
                
                const dot = A * C + B * D;
                const lenSq = C * C + D * D;
                let param = -1;
                
                if (lenSq !== 0) {
                    param = dot / lenSq;
                }
                
                let xx, yy;
                
                if (param < 0) {
                    xx = x1;
                    yy = y1;
                } else if (param > 1) {
                    xx = x2;
                    yy = y2;
                } else {
                    xx = x1 + param * C;
                    yy = y1 + param * D;
                }
                
                const dx = px - xx;
                const dy = py - yy;
                
                return Math.sqrt(dx * dx + dy * dy);
            }

            createSymmetricPattern(distance) {
                // NO LIMIT - Create infinite figures
                // Get actual maximum distance from guidelines (now full diagonal)
                const maxDistance = this.guidelines.length > 0 ? this.guidelines[0].maxDistance : Math.sqrt(Math.pow(this.canvas.width, 2) + Math.pow(this.canvas.height, 2)) / 2;
                
                // Ensure distance is within valid range (from center to screen edges)
                const clampedDistance = Math.max(30, Math.min(distance, maxDistance));
                
                // Calculate size with FAST GROWTH - large at midpoint, constant after
                const normalizedDistance = clampedDistance / maxDistance;
                let sizeFactor;
                
                // Fast growth to 50% distance, then constant
                if (normalizedDistance <= 0.5) {
                    // Rapid exponential growth: 0.2 to 1.0 by midpoint
                    sizeFactor = Math.pow(normalizedDistance * 2, 2) * 0.8 + 0.2;
                } else {
                    // Constant size after midpoint
                    sizeFactor = 1.0;
                }
                
                const baseSize = 80; // Large base size
                const finalSize = Math.min(baseSize * sizeFactor, 80); // Max 80px, constant after midpoint
                
                // Create figures using polar coordinates (r, θ)
                for (let i = 0; i < this.numAxes; i++) {
                    const angle = i * (2 * Math.PI / this.numAxes);
                    const x = this.centerX + Math.cos(angle) * clampedDistance;
                    const y = this.centerY + Math.sin(angle) * clampedDistance;
                    
                    const figure = {
                        type: this.selectedShape,
                        x: x,
                        y: y,
                        size: finalSize,
                        opacity: 0,
                        targetOpacity: 0.8,
                        redFlash: 1.0,
                        redFlashDuration: 300,
                        redFlashStartTime: Date.now(),
                        fadeSpeed: 0.02
                    };
                    
                    this.figures.push(figure);
                }
                
                this.updateProgressIndicator();
            }

            clear() {
                // Immediate clear - remove all figures instantly
                this.figures = [];
                this.fadeOutFigures = [];
                this.isFading = false;
                this.fadeProgress = 0;
                this.updateProgressIndicator();
            }

            updateProgressIndicator() {
                const indicator = document.getElementById('figureCount');
                if (indicator) {
                    indicator.textContent = this.figures.length;
                }
            }

            toggleSound() {
                this.soundEnabled = !this.soundEnabled;
                const btn = document.getElementById('soundToggle');
                const span = btn.querySelector('span:last-child');
                span.textContent = this.soundEnabled ? 'Sonido ON' : 'Sonido OFF';
            }

            initAudio() {
                if (typeof AudioContext !== 'undefined') {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
            }

            playClickSound(distance) {
                if (!this.soundEnabled || !this.audioContext) return;
                
                // Play sound using global audio system if available
                if (typeof window.playSound === 'function') {
                    window.playSound('bell', {
                        frequency: 800 + (distance / 2),
                        duration: 150,
                        volume: 0.1
                    });
                }
            }

            animate() {
                // Clear canvas
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Draw guidelines
                this.drawGuidelines();
                
                // Update and draw figures
                this.updateFigures();
                this.drawFigures();
                
                // Handle fade out
                if (this.isFading) {
                    this.handleFadeOut();
                }
                
                requestAnimationFrame(() => this.animate());
            }

            drawGuidelines() {
                this.ctx.save();
                this.ctx.strokeStyle = 'rgba(30, 41, 59, 0.2)';
                this.ctx.lineWidth = 1;
                this.ctx.setLineDash([5, 10]);
                
                for (const guideline of this.guidelines) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(this.centerX, this.centerY);
                    this.ctx.lineTo(guideline.endX, guideline.endY);
                    this.ctx.stroke();
                }
                
                this.ctx.restore();
            }

            updateFigures() {
                for (let i = this.figures.length - 1; i >= 0; i--) {
                    const figure = this.figures[i];
                    
                    // Fade in
                    if (figure.opacity < figure.targetOpacity) {
                        figure.opacity += figure.fadeSpeed;
                        if (figure.opacity > figure.targetOpacity) {
                            figure.opacity = figure.targetOpacity;
                        }
                    }
                    
                    // Update red flash
                    const currentTime = Date.now();
                    const elapsed = currentTime - figure.redFlashStartTime;
                    if (elapsed < figure.redFlashDuration) {
                        figure.redFlash = 1 - (elapsed / figure.redFlashDuration);
                    } else {
                        figure.redFlash = 0;
                    }
                }
            }

            drawFigures() {
                for (const figure of this.figures) {
                    this.drawFigure(figure);
                }
            }

            drawFigure(figure) {
                this.ctx.save();
                
                // Set colors with red flash effect
                if (figure.redFlash > 0) {
                    this.ctx.strokeStyle = `rgba(185, 28, 28, ${figure.redFlash})`;
                } else {
                    this.ctx.strokeStyle = '#000000';
                }
                
                // No fill - completely transparent
                this.ctx.lineWidth = 3;
                this.ctx.globalAlpha = figure.opacity;
                
                // Draw based on type
                switch (figure.type) {
                    case 'circle':
                        this.ctx.beginPath();
                        this.ctx.arc(figure.x, figure.y, figure.size, 0, Math.PI * 2);
                        this.ctx.stroke();
                        break;
                        
                    case 'triangle':
                        this.ctx.beginPath();
                        const triangleHeight = figure.size * 1.5;
                        const triangleWidth = figure.size * 1.732;
                        this.ctx.moveTo(figure.x, figure.y - triangleHeight / 2);
                        this.ctx.lineTo(figure.x - triangleWidth / 2, figure.y + triangleHeight / 2);
                        this.ctx.lineTo(figure.x + triangleWidth / 2, figure.y + triangleHeight / 2);
                        this.ctx.closePath();
                        this.ctx.stroke();
                        break;
                        
                    case 'square':
                        this.ctx.beginPath();
                        this.ctx.rect(figure.x - figure.size, figure.y - figure.size, figure.size * 2, figure.size * 2);
                        this.ctx.stroke();
                        break;
                        
                    case 'pentagon':
                        this.ctx.beginPath();
                        for (let j = 0; j < 5; j++) {
                            const angle = (j * 2 * Math.PI / 5) - Math.PI / 2;
                            const px = figure.x + Math.cos(angle) * figure.size;
                            const py = figure.y + Math.sin(angle) * figure.size;
                            if (j === 0) {
                                this.ctx.moveTo(px, py);
                            } else {
                                this.ctx.lineTo(px, py);
                            }
                        }
                        this.ctx.closePath();
                        this.ctx.stroke();
                        break;
                        
                    case 'hexagon':
                        this.ctx.beginPath();
                        for (let j = 0; j < 6; j++) {
                            const angle = (j * 2 * Math.PI / 6);
                            const px = figure.x + Math.cos(angle) * figure.size;
                            const py = figure.y + Math.sin(angle) * figure.size;
                            if (j === 0) {
                                this.ctx.moveTo(px, py);
                            } else {
                                this.ctx.lineTo(px, py);
                            }
                        }
                        this.ctx.closePath();
                        this.ctx.stroke();
                        break;
                }
                
                this.ctx.restore();
            }

            handleFadeOut() {
                this.fadeProgress += 0.05;
                
                if (this.fadeProgress >= 1) {
                    this.figures = [];
                    this.fadeOutFigures = [];
                    this.isFading = false;
                    this.fadeProgress = 0;
                    this.updateProgressIndicator();
                } else {
                    // Fade out existing figures
                    for (const figure of this.figures) {
                        figure.opacity = (1 - this.fadeProgress) * figure.targetOpacity;
                    }
                }
            }
        }

        // Iniciar cuando se carga la página
        document.addEventListener('DOMContentLoaded', () => {
            new PatronesGeometricos();
        });
    </script>
</body>
</html>
