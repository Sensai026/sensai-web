<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometría Zen - Regulación Sensorial</title>
    <link rel="stylesheet" href="../css/sensorial_global.css">
    <script src="../js/audio_sintetizador.js"></script>
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #E0F2FE 0%, #F0FDF4 50%, #FAF5FF 100%);
            position: relative;
            margin: 0;
            padding: 0;
            color: #1E293B;
            width: 100vw;
            height: 100vh;
            user-select: none; 
            -webkit-touch-callout: none;
        }

        canvas {
            display: block;
            cursor: crosshair;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            width: 100vw;
            height: 100vh;
        }

        .progress-indicator {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(30, 41, 59, 0.1);
            border-radius: 20px;
            padding: 8px 16px;
            font-family: 'Quicksand', sans-serif;
            font-size: clamp(0.8rem, 2vw, 1rem);
            color: #1E293B;
            z-index: 10;
            max-width: 90%;
            text-align: center;
            white-space: nowrap;
        }

        .header-titulo {
            font-family: 'Outfit', sans-serif;
            color: #1E293B;
            position: absolute;
            top: clamp(40px, 8vh, 60px);
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 600;
            text-align: center;
            z-index: 10;
            margin: 0;
            max-width: 90%;
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(30, 41, 59, 0.2);
            border-radius: 50%;
            color: #1E293B;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.3s ease;
            z-index: 10;
            outline: none !important;
            text-decoration: none !important;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .control-btn-delgado {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(4px, 1vw, 8px);
            padding: clamp(8px, 2vh, 12px) clamp(12px, 3vw, 16px);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(30, 41, 59, 0.2);
            border-radius: 20px;
            font-family: 'Quicksand', sans-serif;
            font-size: clamp(0.8rem, 2vw, 0.9rem);
            color: #1E293B;
            transition: all 0.3s ease;
            white-space: nowrap;
            min-height: 44px;
            min-width: 44px;
            touch-action: manipulation;
            outline: none !important;
            text-decoration: none !important;
        }

        .control-btn-delgado.active {
            background: #000000;
            color: white;
        }

        .barra-controles-delgada {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(8px, 2vw, 12px);
            padding: clamp(8px, 2vh, 12px) clamp(16px, 4vw, 24px);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(30, 41, 59, 0.2);
            border-radius: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            z-index: 10;
            will-change: transform;
        }

        .contador-delgado {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(4px, 1vw, 8px);
            padding: clamp(8px, 2vh, 12px) clamp(12px, 3vw, 16px);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(30, 41, 59, 0.2);
            border-radius: 20px;
            font-family: 'Quicksand', sans-serif;
            font-size: clamp(0.8rem, 2vw, 0.9rem);
            color: #1E293B;
            min-width: 44px;
            min-height: 44px;
            text-align: center;
            outline: none !important;
            text-decoration: none !important;
        }

        .canvas-no-interaction {
            pointer-events: none;
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <!-- Botón de Regreso -->
    <a href="#" class="back-button" id="backButton" title="Volver al menú">
        ←
    </a>

    <!-- Indicador de Progreso Minimalista -->
    <div class="progress-indicator" id="progressIndicator">
        <span id="shapeCount">0</span> figuras
    </div>

    <!-- Título de la Herramienta -->
    <h1 class="header-titulo">🧘 Geometría Zen</h1>

    <!-- Barra de Controles Inferior -->
    <div class="barra-controles-delgada">
        <button class="control-btn-delgado" id="modeBtn">
            <span>🏖️</span>
            <span>Arena</span>
        </button>
        <button class="control-btn-delgado" id="clearBtn">
            <span>🧹</span>
            <span>Limpiar</span>
        </button>
        <button class="control-btn-delgado" id="soundToggle">
            <span>🔊</span>
            <span>Sonido ON</span>
        </button>
    </div>

    <!-- Área Interactiva -->
    <canvas id="zenCanvas" class="area-interactiva-maximizada"></canvas>

    <script src="../js/audio_sintetizador.js"></script>
    <script>
        // Bloqueo de menús del navegador para inmersión total
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.body.style.userSelect = 'none';
        document.body.style.webkitTouchCallout = 'none';
        
        // Ajuste de pantalla responsivo
        function resizeCanvas() {
            const canvas = document.getElementById('zenCanvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', resizeCanvas);
        
        // Inicializar canvas responsivo
        resizeCanvas();
        
        
        class GeometriaZen {
            constructor() {
                this.canvas = document.getElementById('zenCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.mode = 'arena'; // arena, constelaciones
                this.soundEnabled = true;
                this.isDrawing = false;
                this.lastX = 0;
                this.lastY = 0;
                this.currentX = 0;
                this.currentY = 0;
                
                // Arena mode properties
                this.arenaPoints = [];
                
                // Constelaciones mode properties
                this.constellationPoints = [];
                // Remove limit for infinite flow
                // this.maxConstellationPoints = 20;
                
                
                // Audio context
                this.audioContext = null;
                this.brownNoiseNode = null;
                this.brownNoiseGain = null;
                this.sineOscillator = null;
                this.sineGain = null;
                this.windAudioEngine = null;
                
                this.init();
            }

            init() {
                this.resizeCanvas();
                this.setupEventListeners();
                this.initAudio();
                this.animate();
            }

            resizeCanvas() {
                const oldWidth = this.canvas.width;
                const oldHeight = this.canvas.height;
                
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                
                // Recenter existing elements when canvas resizes
                const scaleX = this.canvas.width / oldWidth;
                const scaleY = this.canvas.height / oldHeight;
                
                for (const point of this.arenaPoints) {
                    point.x = point.x * scaleX;
                    point.y = point.y * scaleY;
                }
                
                for (const point of this.constellationPoints) {
                    point.x = point.x * scaleX;
                    point.y = point.y * scaleY;
                }
            }

            setupEventListeners() {
                // Canvas events
                this.canvas.addEventListener('mousedown', (e) => this.startDrawing(e));
                this.canvas.addEventListener('mousemove', (e) => this.draw(e));
                this.canvas.addEventListener('mouseup', () => this.stopDrawing());
                this.canvas.addEventListener('mouseleave', () => this.stopDrawing());

                // Touch events
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const rect = this.canvas.getBoundingClientRect();
                    const mouseEvent = new MouseEvent('mousedown', {
                        clientX: touch.clientX,
                        clientY: touch.clientY
                    });
                    this.startDrawing(mouseEvent);
                });

                this.canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const rect = this.canvas.getBoundingClientRect();
                    const mouseEvent = new MouseEvent('mousemove', {
                        clientX: touch.clientX,
                        clientY: touch.clientY
                    });
                    this.draw(mouseEvent);
                });

                this.canvas.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    this.stopDrawing();
                });

                // Control buttons
                document.getElementById('modeBtn').addEventListener('click', () => {
                    this.cycleMode();
                });

                document.getElementById('clearBtn').addEventListener('click', () => {
                    this.clear();
                });

                document.getElementById('soundToggle').addEventListener('click', () => {
                    this.toggleSound();
                });

                // Window resize
                window.addEventListener('resize', () => {
                    this.resizeCanvas();
                });

                // Back button
                document.getElementById('backButton').addEventListener('click', (e) => {
                    e.preventDefault();
                    if (window.parent && window.parent.sensorialAPI) {
                        window.parent.sensorialAPI.closeExercise();
                    } else {
                        window.history.back();
                    }
                });
                
                // Update progress indicator
                this.updateProgressIndicator();
            }

            cycleMode() {
                const modes = ['arena', 'constelaciones'];
                const currentIndex = modes.indexOf(this.mode);
                this.mode = modes[(currentIndex + 1) % modes.length];
                
                const btn = document.getElementById('modeBtn');
                const modeConfig = {
                    'arena': { icon: '🏖️', text: 'Arena' },
                    'constelaciones': { icon: '⭐', text: 'Constelaciones' }
                };
                
                btn.innerHTML = `<span>${modeConfig[this.mode].icon}</span><span>${modeConfig[this.mode].text}</span>`;
                
                this.clear();
            }

            startDrawing(e) {
                
                this.isDrawing = true;
                const rect = this.canvas.getBoundingClientRect();
                this.lastX = e.clientX - rect.left;
                this.lastY = e.clientY - rect.top;
                this.currentX = this.lastX;
                this.currentY = this.lastY;
                
                if (this.mode === 'constelaciones') {
                    this.addConstellationPoint(this.lastX, this.lastY);
                }
            }

            draw(e) {
                if (!this.isDrawing) return;
                
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                if (this.mode === 'arena') {
                    // Flujo infinito - sin límites de figuras
                    const distance = Math.sqrt(
                        Math.pow(x - this.lastX, 2) + 
                        Math.pow(y - this.lastY, 2)
                    );
                    
                    // Solo dibujar si hay movimiento suficiente
                    if (distance > 1) {
                        // Punto de control para curva Bezier cuadrática
                        const controlX = (this.lastX + x) / 2;
                        const controlY = (this.lastY + y) / 2;
                        
                        // Partículas proporcionales y ligeras
                        const particleCount = Math.max(2, Math.floor(distance / 3));
                        
                        for (let i = 0; i < particleCount; i++) {
                            const t = i / particleCount;
                            
                            // Curva Bezier cuadrática para suavizado orgánico
                            const bezierX = Math.pow(1-t, 2) * this.lastX + 2 * (1-t) * t * controlX + Math.pow(t, 2) * x;
                            const bezierY = Math.pow(1-t, 2) * this.lastY + 2 * (1-t) * t * controlY + Math.pow(t, 2) * y;
                            
                            // Dispersión aleatoria muy baja (máximo 2px de radio)
                            const jitterX = (Math.random() - 0.5) * 2;
                            const jitterY = (Math.random() - 0.5) * 2;
                            
                            // Partículas diminutas (0.5px a 1px)
                            const particleSize = 0.5 + Math.random() * 0.5;
                            
                            this.addArenaPoint(bezierX + jitterX, bezierY + jitterY, particleSize);
                        }
                        
                        this.lastX = x;
                        this.lastY = y;
                    }
                }
            }

            stopDrawing() {
                this.isDrawing = false;
                if (this.mode === 'arena') {
                    this.stopArenaSound();
                }
            }

            addArenaPoint(x, y, particleSize = 1.0) {
                this.arenaPoints.push({
                    x: x,
                    y: y,
                    size: particleSize, // Tamaño de partícula volátil
                    life: 1.0
                });
                
                // Remove limit to allow infinite sand flow
                // No limit on arena points for continuous flow
                
                this.playArenaSound();
                this.updateProgressIndicator();
            }

            addConstellationPoint(x, y) {
                this.constellationPoints.push({
                    x: x,
                    y: y,
                    life: 1.0,
                    createdAt: Date.now()
                });
                
                // Remove limit for infinite flow
                // if (this.constellationPoints.length > this.maxConstellationPoints) {
                //     this.constellationPoints.shift();
                // }
                
                this.playConstellationSound();
                this.updateProgressIndicator();
            }

            clear() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.arenaPoints = [];
                this.constellationPoints = [];
                this.updateProgressIndicator();
            }
            
            updateProgressIndicator() {
                const indicator = document.getElementById('shapeCount');
                if (indicator) {
                    const totalShapes = this.arenaPoints.length + this.constellationPoints.length;
                    indicator.textContent = totalShapes;
                }
            }

            toggleSound() {
                this.soundEnabled = !this.soundEnabled;
                const btn = document.getElementById('soundToggle');
                btn.innerHTML = this.soundEnabled ? 
                    '<span>🔊</span><span>Sonido ON</span>' : 
                    '<span>🔇</span><span>Sonido OFF</span>';
                
                if (!this.soundEnabled) {
                    this.stopAllSounds();
                }
            }

            initAudio() {
                if (!window.AudioContext && !window.webkitAudioContext) return;
                
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // Initialize brown noise for arena mode
                this.initBrownNoise();
                
                // Initialize wind audio engine for all modes
                this.initWindAudio();
            }

            initBrownNoise() {
                if (!this.audioContext) return;
                
                // Create brown noise using white noise and filtering
                const bufferSize = 4096;
                const whiteNoise = this.audioContext.createScriptProcessor(bufferSize, 1, 1);
                
                whiteNoise.onaudioprocess = (e) => {
                    const output = e.outputBuffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        output[i] = Math.random() * 2 - 1;
                    }
                };
                
                // Create filters for brown noise
                const lowpass = this.audioContext.createBiquadFilter();
                lowpass.type = 'lowpass';
                lowpass.frequency.value = 400;
                
                const lowpass2 = this.audioContext.createBiquadFilter();
                lowpass2.type = 'lowpass';
                lowpass2.frequency.value = 200;
                
                this.brownNoiseGain = this.audioContext.createGain();
                this.brownNoiseGain.gain.value = 0;
                
                // Connect the noise chain
                whiteNoise.connect(lowpass);
                lowpass.connect(lowpass2);
                lowpass2.connect(this.brownNoiseGain);
                this.brownNoiseGain.connect(this.audioContext.destination);
                
                this.brownNoiseNode = whiteNoise;
            }

            playArenaSound() {
                if (!this.soundEnabled || !this.brownNoiseGain) return;
                
                // Calculate speed based on mouse movement
                const speed = Math.sqrt(
                    Math.pow(this.currentX - this.lastX, 2) + 
                    Math.pow(this.currentY - this.lastY, 2)
                );
                
                // Map speed to volume (0.01 to 0.15)
                const volume = Math.min(0.15, Math.max(0.01, speed * 0.002));
                this.brownNoiseGain.gain.setTargetAtTime(volume, this.audioContext.currentTime, 0.01);
            }

            stopArenaSound() {
                if (!this.brownNoiseGain) return;
                this.brownNoiseGain.gain.setTargetAtTime(0, this.audioContext.currentTime, 0.1);
            }

            playConstellationSound() {
                if (!this.soundEnabled || !this.audioContext) return;
                
                // Create sine wave oscillator
                const oscillator = this.audioContext.createOscillator();
                const gain = this.audioContext.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.value = 220; // A3
                
                gain.gain.setValueAtTime(0, this.audioContext.currentTime);
                gain.gain.linearRampToValueAtTime(0.1, this.audioContext.currentTime + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 2);
                
                oscillator.connect(gain);
                gain.connect(this.audioContext.destination);
                
                oscillator.start(this.audioContext.currentTime);
                oscillator.stop(this.audioContext.currentTime + 2);
            }

            initWindAudio() {
                if (!this.audioContext) return;
                
                // Create wind sound using filtered noise
                const bufferSize = 4096;
                const whiteNoise = this.audioContext.createScriptProcessor(bufferSize, 1, 1);
                
                whiteNoise.onaudioprocess = (e) => {
                    const output = e.outputBuffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        output[i] = Math.random() * 2 - 1;
                    }
                };
                
                // Create filters for wind sound
                const lowpass = this.audioContext.createBiquadFilter();
                lowpass.type = 'lowpass';
                lowpass.frequency.value = 800;
                
                const lowpass2 = this.audioContext.createBiquadFilter();
                lowpass2.type = 'lowpass';
                lowpass2.frequency.value = 400;
                
                this.windGain = this.audioContext.createGain();
                this.windGain.gain.value = 0;
                
                // Connect wind chain
                whiteNoise.connect(lowpass);
                lowpass.connect(lowpass2);
                lowpass2.connect(this.windGain);
                this.windGain.connect(this.audioContext.destination);
                
                this.windNoiseNode = whiteNoise;
            }
            
            playWindSound(intensity = 0.05) {
                if (!this.soundEnabled || !this.windGain) return;
                this.windGain.gain.setTargetAtTime(intensity, this.audioContext.currentTime, 0.01);
            }
            
            stopWindSound() {
                if (!this.windGain) return;
                this.windGain.gain.setTargetAtTime(0, this.audioContext.currentTime, 0.1);
            }


            stopAllSounds() {
                this.stopArenaSound();
                this.stopWindSound();
            }

            animate() {
                const currentTime = Date.now();
                
                if (this.mode === 'arena') {
                    this.animateArena();
                } else if (this.mode === 'constelaciones') {
                    this.animateConstelaciones(currentTime);
                }
                
                this.updateProgressIndicator();
                requestAnimationFrame(() => this.animate());
            }

            animateArena() {
                // Don't clear - keep persistent drawing for infinite flow
                
                const centerX = this.canvas.width / 2;
                
                // Optimized rendering with batch drawing
                this.ctx.save();
                this.ctx.fillStyle = 'rgba(30, 41, 59, 1.0)'; // Gris Carbón puro
                this.ctx.globalAlpha = 0.15; // Reduced opacity for better layering
                
                // Batch draw all arena points for performance
                this.ctx.beginPath();
                for (let i = 0; i < this.arenaPoints.length; i++) {
                    const point = this.arenaPoints[i];
                    const particleSize = point.size || 1.0;
                    
                    // Original particle
                    this.ctx.moveTo(point.x + particleSize, point.y);
                    this.ctx.arc(point.x, point.y, particleSize, 0, Math.PI * 2);
                    
                    // Symmetric particle
                    const symmetricX = centerX * 2 - point.x;
                    this.ctx.moveTo(symmetricX + particleSize, point.y);
                    this.ctx.arc(symmetricX, point.y, particleSize, 0, Math.PI * 2);
                }
                this.ctx.fill();
                
                this.ctx.restore();
                
                // Play wind sound based on movement
                if (this.isDrawing) {
                    const speed = Math.sqrt(
                        Math.pow(this.currentX - this.lastX, 2) + 
                        Math.pow(this.currentY - this.lastY, 2)
                    );
                    this.playWindSound(Math.min(speed / 100, 0.1));
                } else {
                    this.stopWindSound();
                }
            }

            animateConstelaciones(currentTime) {
                // Don't clear - keep persistent drawing
                
                const centerX = this.canvas.width / 2;
                
                // Optimized constellation rendering with batch drawing
                this.ctx.fillStyle = 'rgba(30, 41, 59, 1.0)';
                this.ctx.beginPath();
                for (let i = 0; i < this.constellationPoints.length; i++) {
                    const point = this.constellationPoints[i];
                    
                    // Original point
                    this.ctx.moveTo(point.x + 2, point.y);
                    this.ctx.arc(point.x, point.y, 2, 0, Math.PI * 2);
                    
                    // Symmetric point
                    const symmetricX = centerX * 2 - point.x;
                    this.ctx.moveTo(symmetricX + 2, point.y);
                    this.ctx.arc(symmetricX, point.y, 2, 0, Math.PI * 2);
                }
                this.ctx.fill();
                
                // Draw connections to previous points
                this.ctx.strokeStyle = 'rgba(30, 41, 59, 0.5)';
                this.ctx.lineWidth = 1;
                for (let i = 1; i < this.constellationPoints.length; i++) {
                    const point = this.constellationPoints[i];
                    const prevPoint = this.constellationPoints[i - 1];
                    
                    this.ctx.beginPath();
                    this.ctx.moveTo(prevPoint.x, prevPoint.y);
                    this.ctx.lineTo(point.x, point.y);
                    this.ctx.stroke();
                }
                
                // Play subtle wind sound
                this.playWindSound(0.02);
            }


        }

        // Iniciar cuando se carga la página
        window.addEventListener('load', () => {
            new GeometriaZen();
        });
    </script>
</body>
</html>
