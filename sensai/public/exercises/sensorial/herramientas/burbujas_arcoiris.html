<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burbujas de Arcoíris - Regulación Sensorial</title>
    <link rel="stylesheet" href="../css/sensorial_global.css">
    <script src="../js/audio_sintetizador.js"></script>
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #E0F2FE 0%, #F0FDF4 50%, #FAF5FF 100%);
            position: relative;
            margin: 0;
            padding: 0;
            color: #1E293B;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            cursor: crosshair;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
            width: 100vw;
            height: 100vh;
        }

        .progress-indicator {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(30, 41, 59, 0.1);
            border-radius: 20px;
            padding: 8px 16px;
            font-family: 'Quicksand', sans-serif;
            font-size: clamp(0.8rem, 2vw, 1rem);
            color: #1E293B;
            z-index: 10;
            max-width: 90%;
            text-align: center;
            white-space: nowrap;
        }

        .header-titulo {
            font-family: 'Outfit', sans-serif;
            color: #1E293B;
            position: absolute;
            top: clamp(40px, 8vh, 60px);
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 600;
            text-align: center;
            z-index: 10;
            margin: 0;
            max-width: 90%;
        }

        .barra-controles-delgada {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            background: transparent !important;
            padding: 0;
            border: none !important;
            border-radius: 0;
            backdrop-filter: none;
            box-shadow: none;
            z-index: 1000;
            will-change: transform;
            max-width: 95vw;
        }

        .control-btn-delgado {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(4px, 1vw, 8px);
            padding: clamp(8px, 2vh, 12px) clamp(12px, 3vw, 16px);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(30, 41, 59, 0.1);
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            font-size: clamp(0.8rem, 2vw, 0.9rem);
            color: #1E293B;
            transition: all 0.3s ease;
            white-space: nowrap;
            min-height: 44px;
            min-width: 44px;
            touch-action: manipulation;
        }

        .control-btn-delgado:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        .control-btn-delgado.active {
            background: #000000;
            color: white;
        }

        .control-btn-delgado span:first-child {
            font-size: 1.1rem;
        }

        .contador-delgado {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(4px, 1vw, 8px);
            padding: clamp(8px, 2vh, 12px) clamp(12px, 3vw, 16px);
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #1E293B;
            border-radius: 20px;
            font-family: 'Quicksand', sans-serif;
            font-size: clamp(0.8rem, 2vw, 0.9rem);
            color: #1E293B;
            min-width: 44px;
            min-height: 44px;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- Botón de Regreso -->
    <a href="#" class="back-button" id="backButton" title="Volver al menú">
        ←
    </a>

    <!-- Indicador de Progreso Minimalista -->
    <div class="progress-indicator" id="progressIndicator">
        <span id="bubbleCount">0</span> burbujas
    </div>

    <!-- Título de la Herramienta -->
    <h1 class="header-titulo">🫧 Burbujas de Arcoíris</h1>

    <!-- Barra de Controles Inferior -->
    <div class="barra-controles-delgada">
        <button class="control-btn-delgado" id="soundToggle">
            <span>🔊</span>
            <span>Sonido ON</span>
        </button>
        <button class="control-btn-delgado" id="gravityToggle">
            <span>🌍</span>
            <span>Gravedad OFF</span>
        </button>
        <button class="control-btn-delgado" id="clearBtn">
            <span>🗑️</span>
            <span>Limpiar</span>
        </button>
    </div>

    <!-- Área Interactiva -->
    <canvas id="bubblesCanvas" class="area-interactiva-maximizada"></canvas>

    <script src="../js/audio_sintetizador.js"></script>
    <script>
        // Bloqueo de menús del navegador para inmersión total
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.body.style.userSelect = 'none';
        document.body.style.webkitTouchCallout = 'none';
        
        // Inicializar canvas responsivo se hará en BubbleGame
        
        
        class Burbuja {
            constructor(x, y, canvas) {
                this.x = x;
                this.y = y;
                this.canvas = canvas;
                // Rango amplio: desde gotas diminutas (5px) hasta esferas de cristal gigantes (80px)
                this.radius = Math.random() * 75 + 5; // 5-80px
                this.color = this.generateColor();
                // Velocidad variable según tamaño: burbujas grandes suben más lento
                this.vx = (Math.random() - 0.5) * (3 - this.radius / 40); // Velocidad horizontal variable
                this.vy = -(Math.random() * 2.5 + 0.5) * (1 - this.radius / 100); // Velocidad vertical según tamaño
                this.gravity = 0.05;
                this.opacity = 1;
                this.popping = false;
                this.popAnimation = 0;
                this.hue = Math.random() * 360;
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.05 + Math.random() * 0.05;
                // Propiedades para oscilación orgánica
                this.floatAmplitude = Math.random() * 30 + 10; // Amplitud de flotación
                this.floatFrequency = Math.random() * 0.02 + 0.01; // Frecuencia de flotación
                this.floatPhase = Math.random() * Math.PI * 2; // Fase inicial
                this.originalX = x; // Posición X original para flotación
            }

            generateColor() {
                const colors = [
                    'rgba(255, 107, 107, 0.7)',  // Rojo
                    'rgba(255, 193, 7, 0.7)',    // Amarillo
                    'rgba(76, 175, 80, 0.7)',    // Verde
                    'rgba(33, 150, 243, 0.7)',   // Azul
                    'rgba(156, 39, 176, 0.7)',   // Púrpura
                    'rgba(255, 152, 0, 0.7)',    // Naranja
                    'rgba(0, 188, 212, 0.7)',    // Cian
                    'rgba(233, 30, 99, 0.7)'     // Rosa
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            update(gravityEnabled = false) {
                if (this.popping) {
                    this.popAnimation += 0.1;
                    this.opacity = Math.max(0, 1 - this.popAnimation);
                    this.radius += 2;
                    return this.opacity > 0;
                }

                // Aplicar gravedad si está habilitada
                if (gravityEnabled) {
                    this.vy += this.gravity;
                }

                // Movimiento flotante orgánico con oscilación
                this.floatPhase += this.floatFrequency;
                
                // Oscilación lateral usando seno para movimiento natural
                const floatOffset = Math.sin(this.floatPhase) * this.floatAmplitude;
                
                // Actualizar posición
                this.x += this.vx + floatOffset * 0.1;
                this.y += this.vy;

                // DETECCIÓN DE COLISIONES CON BORDES (Bounding Box)
                const restitution = 0.7; // Coeficiente de restitución (elasticidad)
                
                // Colisión con borde izquierdo
                if (this.x - this.radius <= 0) {
                    this.x = this.radius; // Corregir posición
                    this.vx = Math.abs(this.vx) * restitution; // Invertir y aplicar elasticidad
                }
                
                // Colisión con borde derecho
                if (this.x + this.radius >= this.canvas.width) {
                    this.x = this.canvas.width - this.radius; // Corregir posición
                    this.vx = -Math.abs(this.vx) * restitution; // Invertir y aplicar elasticidad
                }
                
                // Colisión con borde superior (techo)
                if (this.y - this.radius <= 0) {
                    this.y = this.radius; // Corregir posición
                    this.vy = Math.abs(this.vy) * restitution; // Invertir y aplicar elasticidad
                }
                
                // Colisión con borde inferior (suelo)
                if (this.y + this.radius >= this.canvas.height) {
                    this.y = this.canvas.height - this.radius; // Corregir posición
                    
                    // En modo gravedad, comportamiento de amontonamiento
                    if (gravityEnabled) {
                        // Reducir velocidad vertical significativamente al tocar suelo
                        this.vy = -Math.abs(this.vy) * 0.3; // Rebote muy débil
                        
                        // Fricción horizontal fuerte al tocar suelo
                        this.vx *= 0.7;
                        
                        // Si la velocidad es muy baja, detener completamente (amontonamiento)
                        if (Math.abs(this.vy) < 0.3) {
                            this.vy = 0;
                            this.vx *= 0.9; // Fricción adicional cuando está detenida
                        }
                    } else {
                        // En modo flotación, rebote normal
                        this.vy = -Math.abs(this.vy) * restitution;
                    }
                }

                // Fricción del aire
                const airResistance = 0.999;
                this.vx *= airResistance;
                this.vy *= airResistance;

                // Las burbujas nunca desaparecen por salir de los bordes
                return true;
            }

            draw(ctx) {
                ctx.save();
                
                // Color con arcoíris dinámico
                const hue = (this.hue + Date.now() * 0.01) % 360;
                
                // Gradiente simple
                const gradient = ctx.createRadialGradient(
                    this.x - this.radius * 0.3, 
                    this.y - this.radius * 0.3, 
                    0,
                    this.x, 
                    this.y, 
                    this.radius
                );
                
                gradient.addColorStop(0, `hsla(${hue}, 70%, 70%, ${this.opacity * 0.8})`);
                gradient.addColorStop(0.5, `hsla(${hue}, 80%, 60%, ${this.opacity * 0.6})`);
                gradient.addColorStop(1, `hsla(${hue}, 90%, 50%, ${this.opacity * 0.3})`);

                // Burbuja principal
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // Brillo
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity * 0.4})`;
                ctx.beginPath();
                ctx.arc(
                    this.x - this.radius * 0.3, 
                    this.y - this.radius * 0.3, 
                    this.radius * 0.3, 
                    0, 
                    Math.PI * 2
                );
                ctx.fill();

                ctx.restore();
            }

            checkClick(x, y) {
                const distance = Math.sqrt((x - this.x) ** 2 + (y - this.y) ** 2);
                return distance <= this.radius;
            }

            pop() {
                if (!this.popping) {
                    this.popping = true;
                    return true;
                }
                return false;
            }
        }

        class ParticulaExplosion {
            constructor(x, y, color, parentRadius) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.parentRadius = parentRadius;
                
                // Velocidad inicial radial desde el centro - expansión breve
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 2.5 + 1.5; // Velocidad moderada
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed - 1; // Impulso inicial hacia arriba
                
                // Propiedades físicas para caída suave
                this.radius = Math.random() * 2 + 0.5; // Partículas muy diminutas
                this.gravity = 0.08; // Gravedad suave
                this.opacity = 1;
                this.life = 1;
                this.decay = Math.random() * 0.025 + 0.02; // Fade-out en menos de 1 segundo
                
                // Herencia de colores del arcoíris con variación sutil
                const baseHue = this.extractHueFromColor(color);
                this.hue = baseHue + (Math.random() - 0.5) * 30; // Variación de ±15°
                this.hueSpeed = Math.random() * 3 + 1; // Rotación lenta
                this.saturation = 70 + Math.random() * 15;
                this.lightness = 65 + Math.random() * 15;
            }

            extractHueFromColor(color) {
                // Extraer tono base del color de la burbuja madre
                const colorMap = {
                    'rgba(255, 107, 107, 0.7)': 0,    // Rojo
                    'rgba(255, 193, 7, 0.7)': 50,      // Amarillo
                    'rgba(76, 175, 80, 0.7)': 120,     // Verde
                    'rgba(33, 150, 243, 0.7)': 210,    // Azul
                    'rgba(156, 39, 176, 0.7)': 280,    // Púrpura
                    'rgba(255, 152, 0, 0.7)': 30,      // Naranja
                    'rgba(0, 188, 212, 0.7)': 190,     // Cian
                    'rgba(233, 30, 99, 0.7)': 340       // Rosa
                };
                return colorMap[color] || Math.random() * 360;
            }

            update() {
                // Movimiento con gravedad suave
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                
                // Fricción del aire para caída natural
                this.vx *= 0.985;
                this.vy *= 0.985;
                
                // Desvanecimiento rápido y natural
                this.life -= this.decay;
                this.opacity = Math.max(0, this.life * this.life); // Desvanecimiento cuadrático
                
                // Rotación lenta de arcoíris
                this.hue = (this.hue + this.hueSpeed) % 360;
                
                return this.life > 0;
            }

            draw(ctx) {
                ctx.save();
                
                // Explosión arcoíris con múltiples colores
                const rainbowColors = [
                    `hsla(${this.hue}, 80%, 60%, ${this.opacity})`,
                    `hsla(${(this.hue + 45) % 360}, 80%, 60%, ${this.opacity * 0.8})`,
                    `hsla(${(this.hue + 90) % 360}, 80%, 60%, ${this.opacity * 0.6})`,
                    `hsla(${(this.hue + 135) % 360}, 80%, 60%, ${this.opacity * 0.4})`,
                    `hsla(${(this.hue + 180) % 360}, 80%, 60%, ${this.opacity * 0.3})`
                ];
                
                // Dibujar partícula con efecto arcoíris
                rainbowColors.forEach((color, index) => {
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.arc(
                        this.x + Math.sin(this.life * 10 + index) * 2, 
                        this.y + Math.cos(this.life * 10 + index) * 2, 
                        this.radius * (1 + index * 0.3), 
                        0, 
                        Math.PI * 2
                    );
                    ctx.fill();
                });
                
                ctx.restore();
            }
        }

        class BubbleGame {
            constructor() {
                this.canvas = document.getElementById('bubblesCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.bubbles = [];
                this.particles = []; // Sistema de partículas para explosiones
                this.soundEnabled = true;
                this.gravityEnabled = false;
                this.animationId = null;
                this.bubbleCount = 0;
                
                this.init();
            }

            init() {
                // Inicializar canvas al tamaño correcto
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                
                this.setupEventListeners();
                this.animate();
                
                // Inicializar audio
                if (typeof initAudio === 'function') {
                    initAudio();
                }
            }

            resizeCanvas() {
                const oldWidth = this.canvas.width;
                const oldHeight = this.canvas.height;
                
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                
                // Recenter existing bubbles when canvas resizes
                const scaleX = this.canvas.width / oldWidth;
                const scaleY = this.canvas.height / oldHeight;
                
                for (const bubble of this.bubbles) {
                    bubble.x = bubble.x * scaleX;
                    bubble.y = bubble.y * scaleY;
                    bubble.originalX = bubble.originalX * scaleX;
                }
                
                for (const particle of this.particles) {
                    particle.x = particle.x * scaleX;
                    particle.y = particle.y * scaleY;
                }
            }

            setupEventListeners() {
                // Click para crear burbujas
                this.canvas.addEventListener('click', (e) => this.handleClick(e));
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    this.handleClick({ clientX: touch.clientX, clientY: touch.clientY });
                });

                // Resize
                window.addEventListener('resize', () => this.resizeCanvas());

                // Botón de volver
                document.getElementById('backButton').addEventListener('click', (e) => {
                    e.preventDefault();
                    this.close();
                });

                // Controles
                document.getElementById('soundToggle').addEventListener('click', () => {
                    this.soundEnabled = !this.soundEnabled;
                    const btn = document.getElementById('soundToggle');
                    btn.innerHTML = this.soundEnabled ? 
                        '<span>🔊</span><span>Sonido ON</span>' : 
                        '<span>🔇</span><span>Sonido OFF</span>';
                });

                document.getElementById('gravityToggle').addEventListener('click', () => {
                    this.gravityEnabled = !this.gravityEnabled;
                    const btn = document.getElementById('gravityToggle');
                    btn.innerHTML = this.gravityEnabled ? 
                        '<span>🌍</span><span>Gravedad ON</span>' : 
                        '<span>🌍</span><span>Gravedad OFF</span>';
                });

                document.getElementById('clearBtn').addEventListener('click', () => {
                    this.bubbles = [];
                    this.particles = [];
                    this.explodedCount = 0;
                    this.updateProgressIndicator();
                });
                
                // Update progress indicator
                this.updateProgressIndicator();

                // Tecla ESC
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        this.close();
                    }
                });
            }

            handleClick(e) {
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                // Verificar si se hizo clic en una burbuja existente
                let bubblePopped = false;
                for (let i = this.bubbles.length - 1; i >= 0; i--) {
                    if (this.bubbles[i].checkClick(x, y)) {
                        if (this.bubbles[i].pop()) {
                            bubblePopped = true;
                            // Crear explosión de partículas arcoíris
                            this.createExplosion(this.bubbles[i].x, this.bubbles[i].y, this.bubbles[i]);
                            this.playPopSound(this.bubbles[i]);
                            this.bubbleCount++;
                        }
                        break;
                    }
                }

                // Si no se hizo clic en una burbuja, crear una nueva
                if (!bubblePopped) {
                    this.createBubble(x, y);
                }
            }

            createBubble(x, y) {
                // Aumentar límite para permitir más burbujas
                if (this.bubbles.length >= 100) {
                    // Eliminar la burbuja más antigua
                    this.bubbles.shift();
                }
                
                const bubble = new Burbuja(x, y, this.canvas);
                this.bubbles.push(bubble);
                this.playCreationSound(bubble);
            }

            createExplosion(x, y, bubble) {
                // Crear 5-10 partículas por burbuja explotada
                const particleCount = Math.floor(Math.random() * 6) + 5; // 5-10 partículas
                
                for (let i = 0; i < particleCount; i++) {
                    const particle = new ParticulaExplosion(x, y, bubble.color, bubble.radius);
                    this.particles.push(particle);
                }
            }

            playPopSound(bubble) {
                if (!this.soundEnabled) return;
                
                // Frecuencias bajas para hipersensibilidad: 100-300Hz
                const normalizedSize = bubble.radius / 100; // Normalizado a 0-1 (rango máximo 100px)
                const frequency = 300 - (normalizedSize * 200); // 300Hz (pequeñas) a 100Hz (gigantes)
                
                // Duración más larga para sonido suave
                const duration = 150 + (normalizedSize * 100); // 150-250ms
                
                // Volumen bajo y constante
                const volume = 0.15 + (normalizedSize * 0.1); // 0.15-0.25 (muy bajo)
                
                if (typeof playSound === 'function') {
                    playSound('bubble', { frequency, duration, volume });
                }
            }

            playCreationSound(bubble) {
                if (!this.soundEnabled) return;
                
                // Frecuencias bajas consistentes con hipersensibilidad
                const normalizedSize = bubble.radius / 100;
                const frequency = 280 - (normalizedSize * 180); // 280Hz (pequeñas) a 100Hz (gigantes)
                const duration = 120; // Duración suave
                const volume = 0.12; // Volumen muy bajo
                
                if (typeof playSound === 'function') {
                    playSound('bubble', { frequency, duration, volume });
                }
            }

            updateProgressIndicator() {
                const indicator = document.getElementById('bubbleCount');
                if (indicator) {
                    indicator.textContent = this.bubbles.length;
                }
            }
            

            animate() {
                // Limpiar canvas
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                // Actualizar y dibujar burbujas
                this.bubbles = this.bubbles.filter(bubble => {
                    const alive = bubble.update(this.gravityEnabled);
                    if (alive) {
                        bubble.draw(this.ctx);
                    }
                    return alive;
                });

                // Detectar y resolver colisiones entre burbujas
                this.checkBubbleCollisions();

                // Actualizar y dibujar partículas de explosión
                this.particles = this.particles.filter(particle => {
                    const alive = particle.update();
                    if (alive) {
                        particle.draw(this.ctx);
                    }
                    return alive;
                });
                
                // Update progress indicator
                this.updateProgressIndicator();

                this.animationId = requestAnimationFrame(() => this.animate());
            }

            checkBubbleCollisions() {
                // Primero verificar fusiones de burbujas del mismo color
                this.checkBubbleFusions();
                
                // Luego manejar colisiones normales
                for (let i = 0; i < this.bubbles.length; i++) {
                    for (let j = i + 1; j < this.bubbles.length; j++) {
                        const bubble1 = this.bubbles[i];
                        const bubble2 = this.bubbles[j];
                        
                        const dx = bubble2.x - bubble1.x;
                        const dy = bubble2.y - bubble1.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        const minDistance = bubble1.radius + bubble2.radius;
                        
                        if (distance < minDistance) {
                            // Hay colisión - separar las burbujas
                            const overlap = minDistance - distance;
                            const separationX = (dx / distance) * overlap * 0.5;
                            const separationY = (dy / distance) * overlap * 0.5;
                            
                            bubble1.x -= separationX;
                            bubble1.y -= separationY;
                            bubble2.x += separationX;
                            bubble2.y += separationY;
                            
                            // Calcular velocidades de rebote
                            const normalX = dx / distance;
                            const normalY = dy / distance;
                            
                            const relativeVelocityX = bubble2.vx - bubble1.vx;
                            const relativeVelocityY = bubble2.vy - bubble1.vy;
                            const velocityAlongNormal = relativeVelocityX * normalX + relativeVelocityY * normalY;
                            
                            if (velocityAlongNormal > 0) continue; // Ya se están separando
                            
                            const restitution = 0.7;
                            const impulse = 2 * velocityAlongNormal / (1/bubble1.radius + 1/bubble2.radius) * restitution;
                            
                            bubble1.vx += impulse * normalX / bubble1.radius;
                            bubble1.vy += impulse * normalY / bubble1.radius;
                            bubble2.vx -= impulse * normalX / bubble2.radius;
                            bubble2.vy -= impulse * normalY / bubble2.radius;
                        }
                    }
                }
            }

            checkBubbleFusions() {
                // Agrupar burbujas por color
                const colorGroups = {};
                
                for (let i = 0; i < this.bubbles.length; i++) {
                    const bubble = this.bubbles[i];
                    if (!colorGroups[bubble.color]) {
                        colorGroups[bubble.color] = [];
                    }
                    colorGroups[bubble.color].push(bubble);
                }
                
                // Verificar si hay 5 o más burbujas del mismo color en contacto
                for (const color in colorGroups) {
                    const sameColorBubbles = colorGroups[color];
                    
                    if (sameColorBubbles.length >= 5) {
                        // Verificar si están en contacto (formando un clúster)
                        const touchingBubbles = this.findTouchingCluster(sameColorBubbles);
                        
                        if (touchingBubbles.length >= 5) {
                            // Fusionar las 5 burbujas más grandes del clúster
                            this.fuseBubbles(touchingBubbles.slice(0, 5));
                            return; // Solo una fusión por frame
                        }
                    }
                }
            }

            findTouchingCluster(bubbles) {
                const cluster = [];
                const visited = new Set();
                
                // BFS para encontrar burbujas conectadas
                const queue = [bubbles[0]];
                visited.add(bubbles[0]);
                
                while (queue.length > 0) {
                    const current = queue.shift();
                    cluster.push(current);
                    
                    // Encontrar burbujas que tocan a la actual
                    for (const bubble of bubbles) {
                        if (!visited.has(bubble)) {
                            const dx = bubble.x - current.x;
                            const dy = bubble.y - current.y;
                            const distance = Math.sqrt(dx * dx + dy * dy);
                            const minDistance = bubble.radius + current.radius;
                            
                            if (distance < minDistance + 5) { // Pequeña tolerancia
                                visited.add(bubble);
                                queue.push(bubble);
                            }
                        }
                    }
                }
                
                return cluster;
            }

            fuseBubbles(bubblesToFuse) {
                if (bubblesToFuse.length < 5) return;
                
                // Calcular posición promedio
                let totalX = 0, totalY = 0, totalRadius = 0;
                
                for (const bubble of bubblesToFuse) {
                    totalX += bubble.x;
                    totalY += bubble.y;
                    totalRadius += bubble.radius;
                }
                
                const centerX = totalX / bubblesToFuse.length;
                const centerY = totalY / bubblesToFuse.length;
                const newRadius = Math.min(totalRadius * 0.8, 150); // Tamaño máximo limitado
                
                // Crear burbuja máxima
                const megaBubble = new Burbuja(centerX, centerY, this.canvas);
                megaBubble.radius = newRadius;
                megaBubble.color = bubblesToFuse[0].color; // Mantener el mismo color
                megaBubble.vx = 0;
                megaBubble.vy = 0;
                
                // Eliminar las burbujas fusionadas
                for (const bubble of bubblesToFuse) {
                    const index = this.bubbles.indexOf(bubble);
                    if (index > -1) {
                        this.bubbles.splice(index, 1);
                    }
                }
                
                // Añadir la burbuja máxima
                this.bubbles.push(megaBubble);
                
                // Crear explosión de fusión
                this.createFusionExplosion(centerX, centerY, bubblesToFuse[0].color);
                
                // Reproducir sonido de fusión
                if (this.soundEnabled && typeof playSound === 'function') {
                    playSound('bubble', { frequency: 150, duration: 300, volume: 0.4 });
                }
            }

            createFusionExplosion(x, y, color) {
                // Crear explosión especial para fusión
                const particleCount = 20; // Más partículas para fusión
                
                for (let i = 0; i < particleCount; i++) {
                    const angle = (Math.PI * 2 * i) / particleCount;
                    const speed = Math.random() * 5 + 3;
                    
                    const particle = new ParticulaExplosion(x, y, color, 2);
                    particle.vx = Math.cos(angle) * speed;
                    particle.vy = Math.sin(angle) * speed;
                    particle.gravity = 0.05; // Menos gravedad para efecto más mágico
                    
                    this.particles.push(particle);
                }
            }

            close() {
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                }
                
                // Comunicarse con el padre
                if (window.parent && window.parent.sensorialAPI) {
                    window.parent.sensorialAPI.closeExercise();
                } else {
                    // Fallback para standalone
                    window.history.back();
                }
            }
        }

        // Inicializar cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', () => {
            window.bubbleGame = new BubbleGame();
        });

        // API global para comunicación externa
        window.playSound = window.playSound || function() {};
    </script>
</body>
