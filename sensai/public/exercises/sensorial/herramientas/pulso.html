<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulso Geométrico - Regulación Sensorial</title>
    <link rel="stylesheet" href="../css/sensorial_global.css">
    <script src="../js/audio_sintetizador.js"></script>
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #E0F2FE 0%, #F0FDF4 50%, #FAF5FF 100%);
            position: relative;
            margin: 0;
            padding: 0;
            color: #1E293B;
            width: 100vw;
            height: 100vh;
            user-select: none; 
            -webkit-touch-callout: none;
        }

        canvas {
            display: block;
            cursor: crosshair;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            width: 100vw;
            height: 100vh;
        }

        .progress-indicator {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(30, 41, 59, 0.1);
            border-radius: 20px;
            padding: 8px 16px;
            font-family: 'Quicksand', sans-serif;
            font-size: clamp(0.8rem, 2vw, 1rem);
            color: #1E293B;
            z-index: 10;
            max-width: 90%;
            text-align: center;
            white-space: nowrap;
        }

        .header-titulo {
            font-family: 'Outfit', sans-serif;
            color: #1E293B;
            position: absolute;
            top: clamp(40px, 8vh, 60px);
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 600;
            text-align: center;
            z-index: 10;
            margin: 0;
            max-width: 90%;
        }

        .barra-controles-delgada {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            background: transparent !important;
            padding: 0;
            border: none !important;
            border-radius: 0;
            backdrop-filter: none;
            box-shadow: none;
            z-index: 1000;
            will-change: transform;
            max-width: 95vw;
        }

        .control-btn-delgado {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(4px, 1vw, 8px);
            padding: clamp(8px, 2vh, 12px) clamp(12px, 3vw, 16px);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(30, 41, 59, 0.1);
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            font-size: clamp(0.8rem, 2vw, 0.9rem);
            color: #1E293B;
            transition: all 0.3s ease;
            white-space: nowrap;
            min-height: 44px;
            min-width: 44px;
            touch-action: manipulation;
        }

        .control-btn-delgado:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        .control-btn-delgado.active {
            background: #000000;
            color: white;
        }

        .control-btn-delgado span:first-child {
            font-size: 1.1rem;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: clamp(8px, 2vh, 12px) clamp(12px, 3vw, 16px);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(30, 41, 59, 0.2);
            border-radius: 50px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .speed-slider {
            width: clamp(80px, 15vw, 120px);
            height: 6px;
            background: rgba(30, 41, 59, 0.2);
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }

        .speed-slider::-webkit-slider-thumb {
            width: clamp(16px, 4vw, 20px);
            height: clamp(16px, 4vw, 20px);
            background: #1E293B;
            border-radius: 50%;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            border: none;
        }

        .speed-slider::-moz-range-thumb {
            width: clamp(16px, 4vw, 20px);
            height: clamp(16px, 4vw, 20px);
            background: #1E293B;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .quantity-selector {
            display: flex;
            gap: 10px;
            padding: clamp(8px, 2vh, 12px) clamp(12px, 3vw, 16px);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(30, 41, 59, 0.2);
            border-radius: 50px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .quantity-btn {
            padding: clamp(6px, 1.5vh, 10px) clamp(8px, 2vw, 12px);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(30, 41, 59, 0.2);
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            font-size: clamp(0.8rem, 2vw, 0.9rem);
            color: #1E293B;
            transition: all 0.3s ease;
            min-width: 44px;
            min-height: 44px;
            text-align: center;
            touch-action: manipulation;
        }

        .quantity-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        .quantity-btn.active {
            background: #000000;
            color: white;
            opacity: 1 !important;
        }
    </style>
</head>
<body oncontextmenu="return false;" style="user-select: none; -webkit-touch-callout: none;">
    <!-- Botón de Regreso -->
    <a href="#" class="back-button" id="backButton" title="Volver al menú">
        ←
    </a>

    <!-- Título de la Herramienta -->
    <h1 class="header-titulo">〰️ Pulso Geométrico</h1>

    <!-- Barra de Controles Inferior -->
    <div class="barra-controles-delgada">
        <div class="speed-control">
            <span>🚀</span>
            <input type="range" class="speed-slider" id="speedSlider" min="0.1" max="2" step="0.1" value="0.5">
            <span>Velocidad</span>
        </div>
        <div class="quantity-selector">
            <button class="quantity-btn" data-quantity="3">3</button>
            <button class="quantity-btn active" data-quantity="4">4</button>
            <button class="quantity-btn" data-quantity="6">6</button>
        </div>
        <button class="control-btn-delgado" id="clearBtn">
            <span>🧹</span>
            <span>Limpiar</span>
        </button>
    </div>

    <!-- Área Interactiva -->
    <canvas id="pulseCanvas" class="area-interactiva-maximizada"></canvas>

    <script src="../js/audio_sintetizador.js"></script>
    <script>
        // Bloqueo de menús del navegador para inmersión total
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.body.style.userSelect = 'none';
        document.body.style.webkitTouchCallout = 'none';
        
        // Ajuste de pantalla responsivo
        function resizeCanvas() {
            const canvas = document.getElementById('pulseCanvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', resizeCanvas);
        
        // Inicializar canvas responsivo
        resizeCanvas();
        
        
        class PulsoGeometrico {
            constructor() {
                this.canvas = document.getElementById('pulseCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                // Pulse properties
                this.waves = [];
                this.connections = [];
                this.nodeCount = 4;
                this.pulseSpeed = 0.5;
                this.maxWaves = 5;
                
                
                this.init();
            }

            init() {
                this.resizeCanvas();
                this.setupEventListeners();
                this.animate();
            }

            resizeCanvas() {
                const oldWidth = this.canvas.width;
                const oldHeight = this.canvas.height;
                
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                
                // Recenter existing waves when canvas resizes
                const scaleX = this.canvas.width / oldWidth;
                const scaleY = this.canvas.height / oldHeight;
                
                for (const wave of this.waves) {
                    // Update wave center position
                    wave.waveCenterX = wave.waveCenterX * scaleX;
                    wave.waveCenterY = wave.waveCenterY * scaleY;
                    
                    // Update all nodes in the wave
                    for (const node of wave.nodes) {
                        node.centerX = node.centerX * scaleX;
                        node.centerY = node.centerY * scaleY;
                        node.x = node.x * scaleX;
                        node.y = node.y * scaleY;
                    }
                }
            }

            setupEventListeners() {
                // Canvas events
                this.canvas.addEventListener('click', (e) => this.handleClick(e));
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const mouseEvent = new MouseEvent('click', {
                        clientX: touch.clientX,
                        clientY: touch.clientY
                    });
                    this.handleClick(mouseEvent);
                });

                // Window resize
                window.addEventListener('resize', () => {
                    this.resizeCanvas();
                });

                // Back button
                document.getElementById('backButton').addEventListener('click', (e) => {
                    e.preventDefault();
                    if (window.parent && window.parent.sensorialAPI) {
                        window.parent.sensorialAPI.closeExercise();
                    } else {
                        window.history.back();
                    }
                });

                // Control buttons
                document.getElementById('clearBtn').addEventListener('click', () => {
                    this.clear();
                });
                
                // Update progress indicator
                this.updateProgressIndicator();


                // Speed slider
                document.getElementById('speedSlider').addEventListener('input', (e) => {
                    this.pulseSpeed = parseFloat(e.target.value);
                });

                // Quantity selector
                document.querySelectorAll('.quantity-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.nodeCount = parseInt(e.target.dataset.quantity);
                        
                        // Update active state
                        document.querySelectorAll('.quantity-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                    });
                });
            }

            handleClick(e) {
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                // Calculate distance from center
                const centerX = this.canvas.width / 2;
                const centerY = this.canvas.height / 2;
                const distance = Math.sqrt(
                    Math.pow(x - centerX, 2) + 
                    Math.pow(y - centerY, 2)
                );

                // Create wave with nodes
                this.createWave(distance, x, y);
            }

            createWave(distance, clickX, clickY) {
                // Remove oldest wave if exceeding limit
                if (this.waves.length >= this.maxWaves) {
                    const oldestWave = this.waves.shift();
                    // Fade out oldest wave's nodes
                    oldestWave.nodes.forEach(node => {
                        node.fading = true;
                        node.fadeStart = Date.now();
                    });
                }

                // Calculate angle from click position to center
                const centerX = this.canvas.width / 2;
                const centerY = this.canvas.height / 2;
                const baseAngle = Math.atan2(clickY - centerY, clickX - centerX);

                // Create nodes distributed around the click position
                const nodes = [];
                const angleStep = (2 * Math.PI) / this.nodeCount;
                
                for (let i = 0; i < this.nodeCount; i++) {
                    const angle = baseAngle + (i * angleStep);
                    const x = clickX + Math.cos(angle) * 50; // 50px radius from click point
                    const y = clickY + Math.sin(angle) * 50;
                    
                    nodes.push({
                        x: x,
                        y: y,
                        distance: distance,
                        angle: angle,
                        expanding: Math.random() > 0.5, // Random direction
                        opacity: 1.0,
                        fading: false,
                        fadeStart: 0,
                        pulsePhase: Math.random() * Math.PI * 2,
                        centerX: clickX, // Store original click center
                        centerY: clickY
                    });
                }

                // Add wave
                this.waves.push({
                    nodes: nodes,
                    createdAt: Date.now(),
                    baseDistance: distance,
                    waveCenterX: clickX,
                    waveCenterY: clickY
                });
            }

            updateWaves() {
                // Update waves with safety checks
                for (let w = this.waves.length - 1; w >= 0; w--) {
                    const wave = this.waves[w];
                    
                    // Remove empty waves
                    if (!wave.nodes || wave.nodes.length === 0) {
                        this.waves.splice(w, 1);
                        continue;
                    }
                    
                    for (let n = wave.nodes.length - 1; n >= 0; n--) {
                        const node = wave.nodes[n];
                        
                        // Safety check for node properties
                        if (!node || typeof node.distance === 'undefined') {
                            wave.nodes.splice(n, 1);
                            continue;
                        }
                        
                        // Update pulse movement
                        if (node.expanding) {
                            node.distance += this.pulseSpeed * 0.5;
                        } else {
                            node.distance -= this.pulseSpeed * 0.5;
                        }

                        // Calculate max distance with safety checks
                        const maxDistanceX = Math.min(
                            Math.max(0, wave.waveCenterX - 50),
                            Math.max(0, this.canvas.width - wave.waveCenterX - 50)
                        );
                        const maxDistanceY = Math.min(
                            Math.max(0, wave.waveCenterY - 50),
                            Math.max(0, this.canvas.height - wave.waveCenterY - 50)
                        );
                        const maxDistance = Math.min(maxDistanceX, maxDistanceY, 200);
                        
                        // Reverse direction at boundaries
                        if (node.distance > maxDistance) {
                            node.distance = maxDistance;
                            node.expanding = false;
                        } else if (node.distance < 20) {
                            node.distance = 20;
                            node.expanding = true;
                        }

                        // Update position with safety checks
                        if (typeof node.centerX !== 'undefined' && typeof node.centerY !== 'undefined') {
                            node.x = node.centerX + Math.cos(node.angle) * node.distance;
                            node.y = node.centerY + Math.sin(node.angle) * node.distance;
                        }

                        // Handle fading
                        if (node.fading) {
                            const elapsed = Date.now() - node.fadeStart;
                            const fadeProgress = Math.min(elapsed / 500, 1);
                            node.opacity = 1.0 - fadeProgress;
                            
                            // Remove fully faded nodes
                            if (node.opacity <= 0) {
                                wave.nodes.splice(n, 1);
                            }
                        }
                    }
                }

                // Remove empty waves
                this.waves = this.waves.filter(wave => 
                    wave.nodes && wave.nodes.length > 0
                );
            }

            detectAlignments() {
                this.connections = [];
                
                // Increased limit for more connections
                const maxWavesToCheck = Math.min(this.waves.length, 5);
                
                // Check all node pairs from different waves
                for (let i = 0; i < maxWavesToCheck; i++) {
                    for (let j = i + 1; j < maxWavesToCheck; j++) {
                        const wave1 = this.waves[i];
                        const wave2 = this.waves[j];
                        
                        // Skip if either wave is fading
                        if (wave1.nodes.some(n => n.fading) || wave2.nodes.some(n => n.fading)) {
                            continue;
                        }
                        
                        for (const node1 of wave1.nodes) {
                            // Skip fading nodes
                            if (node1.fading || node1.opacity < 0.3) continue;
                            
                            for (const node2 of wave2.nodes) {
                                // Skip fading nodes
                                if (node2.fading || node2.opacity < 0.3) continue;
                                
                                // Calculate distance between nodes
                                const distance = Math.sqrt(
                                    Math.pow(node1.x - node2.x, 2) + 
                                    Math.pow(node1.y - node2.y, 2)
                                );
                                
                                // Check horizontal alignment (increased tolerance)
                                if (Math.abs(node1.y - node2.y) < 20) {
                                    this.connections.push({
                                        start: node1,
                                        end: node2,
                                        type: 'horizontal',
                                        opacity: 1.0,
                                        createdAt: Date.now()
                                    });
                                }
                                
                                // Check vertical alignment (increased tolerance)
                                if (Math.abs(node1.x - node2.x) < 20) {
                                    this.connections.push({
                                        start: node1,
                                        end: node2,
                                        type: 'vertical',
                                        opacity: 1.0,
                                        createdAt: Date.now()
                                    });
                                }
                                
                                // Check diagonal connections (new feature)
                                if (distance < 100 && distance > 30) {
                                    const angle = Math.atan2(node2.y - node1.y, node2.x - node1.x);
                                    const diagonalAngle = Math.abs(Math.abs(angle) - Math.PI / 4);
                                    
                                    // Connect if close to diagonal (45 degrees)
                                    if (diagonalAngle < Math.PI / 8) {
                                        this.connections.push({
                                            start: node1,
                                            end: node2,
                                            type: 'diagonal',
                                            opacity: 0.8,
                                            createdAt: Date.now()
                                        });
                                    }
                                }
                                
                                // Check proximity connections (new feature)
                                if (distance < 60 && distance > 20) {
                                    this.connections.push({
                                        start: node1,
                                        end: node2,
                                        type: 'proximity',
                                        opacity: 0.6,
                                        createdAt: Date.now()
                                    });
                                }
                            }
                        }
                    }
                }
            }

            updateConnections() {
                const currentTime = Date.now();
                
                // Increased limit for more connections
                if (this.connections.length > 100) {
                    this.connections = this.connections.slice(-100);
                }
                
                // Update connection opacity (fade out over time)
                for (let c = this.connections.length - 1; c >= 0; c--) {
                    const connection = this.connections[c];
                    
                    if (!connection || !connection.start || !connection.end) {
                        this.connections.splice(c, 1);
                        continue;
                    }
                    
                    const elapsed = currentTime - connection.createdAt;
                    const fadeProgress = Math.min(elapsed / 1500, 1); // Slower fade
                    connection.opacity = (1.0 - fadeProgress) * (connection.type === 'diagonal' ? 0.8 : connection.type === 'proximity' ? 0.6 : 1.0);
                    
                    // Remove fully faded connections
                    if (connection.opacity <= 0) {
                        this.connections.splice(c, 1);
                    }
                }
            }

            clear() {
                // Start fade out for all waves
                for (const wave of this.waves) {
                    for (const node of wave.nodes) {
                        node.fading = true;
                        node.fadeStart = Date.now();
                    }
                }
                this.connections = [];
                
                // Update progress indicator
                this.updateProgressIndicator();
            }
            
            updateProgressIndicator() {
                const indicator = document.getElementById('waveCount');
                if (indicator) {
                    indicator.textContent = this.waves.length;
                }
            }


            initAudio() {
                if (!window.AudioContext && !window.webkitAudioContext) return;
                
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }

            playBowlSound(x, y) {
                if (!this.soundEnabled || !this.audioContext) return;
                
                // Calculate stereo panning based on x position
                const normalizedX = x / this.canvas.width;
                const panValue = (normalizedX - 0.5) * 2; // -1 to 1
                
                // Create oscillator for Tibetan bowl sound
                const oscillator = this.audioContext.createOscillator();
                const gain = this.audioContext.createGain();
                const panNode = this.audioContext.createStereoPanner();
                
                // Tibetan bowl frequencies (fundamental + harmonics)
                const baseFreq = 200 + Math.random() * 100; // 200-300Hz range
                oscillator.type = 'sine';
                oscillator.frequency.value = baseFreq;
                
                // Add subtle frequency modulation for bowl effect
                const lfo = this.audioContext.createOscillator();
                const lfoGain = this.audioContext.createGain();
                lfo.frequency.value = 2; // 2Hz modulation
                lfoGain.gain.value = 5; // ±5Hz modulation
                lfo.connect(lfoGain);
                lfoGain.connect(oscillator.frequency);
                
                // Set up panning
                panNode.pan.value = panValue;
                
                // Envelope for gentle bowl sound
                gain.gain.setValueAtTime(0, this.audioContext.currentTime);
                gain.gain.linearRampToValueAtTime(0.08, this.audioContext.currentTime + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 1.5);
                
                // Connect nodes
                oscillator.connect(gain);
                gain.connect(panNode);
                panNode.connect(this.audioContext.destination);
                
                // Start and stop
                oscillator.start(this.audioContext.currentTime);
                lfo.start(this.audioContext.currentTime);
                oscillator.stop(this.audioContext.currentTime + 1.5);
                lfo.stop(this.audioContext.currentTime + 1.5);
            }

            drawNode(node) {
                this.ctx.save();
                
                // Apply opacity
                this.ctx.globalAlpha = node.opacity;
                
                // Draw node
                this.ctx.fillStyle = '#1E293B'; // Gray Carbon
                this.ctx.beginPath();
                this.ctx.arc(node.x, node.y, 4, 0, Math.PI * 2);
                this.ctx.fill();
                
                this.ctx.restore();
            }

            drawConnection(connection) {
                this.ctx.save();
                
                // Apply opacity
                this.ctx.globalAlpha = connection.opacity;
                
                // Draw connection line
                this.ctx.strokeStyle = '#B91C1C'; // Red Intense
                this.ctx.lineWidth = 2;
                this.ctx.beginPath();
                this.ctx.moveTo(connection.start.x, connection.start.y);
                this.ctx.lineTo(connection.end.x, connection.end.y);
                this.ctx.stroke();
                
                this.ctx.restore();
            }

            animate() {
                // Safety check for canvas context
                if (!this.ctx || !this.canvas) {
                    requestAnimationFrame(() => this.animate());
                    return;
                }
                
                // Clear canvas
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Update systems with error handling
                try {
                    this.updateWaves();
                    this.updateConnections();
                    
                    // Only detect alignments periodically to reduce CPU load
                    if (Math.random() < 0.3) { // 30% chance per frame
                        this.detectAlignments();
                    }
                } catch (error) {
                    console.error('Error in update systems:', error);
                }
                
                // Update progress indicator
                this.updateProgressIndicator();
                
                // Draw connections first (behind nodes)
                for (const connection of this.connections) {
                    if (connection && connection.start && connection.end) {
                        this.drawConnection(connection);
                    }
                }
                
                // Draw nodes with safety checks
                for (const wave of this.waves) {
                    if (wave && wave.nodes) {
                        for (const node of wave.nodes) {
                            if (node && node.opacity > 0) {
                                this.drawNode(node);
                            }
                        }
                    }
                }
                
                requestAnimationFrame(() => this.animate());
            }
        }

        // Iniciar cuando se carga la página
        window.addEventListener('load', () => {
            new PulsoGeometrico();
        });
    </script>
</body>
</html>
