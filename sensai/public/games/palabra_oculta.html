<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Palabra Oculta - SENSAI</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />

<style>
/* ╔════════════════════════════════════════════╗
   ║  TOKENS DE COLOR — FUENTE DE VERDAD v2.0            ║
   ╚════════════════════════════════════════════════╝ */
:root {
  /* ── VIOLETA — Primario de acción (38% del uso UI) ── */
  --color-primary:        #7B3FCE;
  --color-primary-dark:   #5A2BAA;
  --color-primary-light:  #F0E8FC;

  /* ── VERDE ESMERALDA — Co-primario (25% del uso UI) ── */
  --color-green:          #00B876;
  --color-green-dark:     #008A56;
  --color-green-light:    #E0F7EE;

  /* ── NARANJA — Acento cálido (10% del uso UI) ── */
  --color-orange:         #FF6820;
  --color-orange-dark:    #CC4A0A;
  --color-orange-light:   #FFF0E8;

  /* ── ÁMBAR — Acento alegre (5% del uso UI) ── */
  --color-amber:          #FFBB00;
  --color-amber-dark:     #CC8F00;
  --color-amber-light:    #FFF8DC;

  /* ── CIAN — IA y tecnología (7% del uso UI) ── */
  --color-ai:             #00CCFF;
  --color-ai-dark:        #0099CC;
  --color-ai-light:       #E0F8FF;

  /* ── ROSA/MAGENTA — Gradiente "A" de SENSAI ── */
  --color-rose:           #E8357A;
  --color-rose-dark:      #B5185A;
  --color-rose-light:     #FCE4EF;

  /* ── AZUL — Solo en gradientes del logo ── */
  --color-blue:           #3A6FE8;
  --color-blue-dark:      #2A5CC8;
  --color-blue-light:     #EDF3FE;

  /* ── NEUTRALES — Base y texto ── */
  --color-bg-primary:     #FFFFFF;
  --color-bg-secondary:   #F8F9FA;
  --color-bg-elevated:   #FFFFFF;
  --color-text-primary:   #1A1A2E;
  --color-text-secondary: #6C757D;
  --color-text-on-dark:   #FFFFFF;
  --color-border:         #E0E0E0;

  /* ── SEMÁNTICOS ── */
  --color-success:        var(--color-green);
  --color-warning:        var(--color-amber);
  --color-error:          var(--color-rose);
  --color-info:           var(--color-ai);

  /* ── TYPOGRAFÍA ── */
  --font-sans:            'DM Sans', sans-serif;
  --font-display:         'DM Serif Display', serif;

  /* ── ESPACIADO ── */
  --space-xs:             4px;
  --space-sm:             8px;
  --space-md:             16px;
  --space-lg:             24px;
  --space-xl:             32px;
  --space-2xl:            48px;
  --space-3xl:            64px;

  /* ── BORDES ── */
  --radius-sm:            4px;
  --radius-md:            8px;
  --radius-lg:            12px;
  --radius-xl:            16px;
  --radius-full:          9999px;

  /* ── SOMBRAS ── */
  --shadow-sm:            0 1px 2px rgba(0,0,0,0.05);
  --shadow-md:            0 4px 6px rgba(0,0,0,0.07);
  --shadow-lg:            0 10px 15px rgba(0,0,0,0.1);
  --shadow-xl:            0 20px 25px rgba(0,0,0,0.1);

  /* ── TRANSICIONES ── */
  --transition-base:      0.2s ease;
  --transition-slow:      0.3s ease;
}

body {
  font-family: var(--font-sans);
  background: linear-gradient(135deg, var(--color-bg-secondary), var(--color-primary-light));
  color: var(--color-text-primary);
  margin: 0;
  padding: var(--space-lg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.game-container {
  background: var(--color-bg-elevated);
  border-radius: var(--radius-xl);
  padding: var(--space-xl);
  box-shadow: var(--shadow-xl);
  max-width: 800px;
  width: 100%;
  text-align: center;
}

h1 {
  font-family: var(--font-display);
  font-size: 2.5rem;
  color: var(--color-primary);
  margin-bottom: var(--space-lg);
}

.descripcion {
  background: linear-gradient(135deg, var(--color-ai-light), var(--color-bg-elevated));
  border-left: 4px solid var(--color-ai);
  padding: var(--space-md);
  border-radius: var(--radius-lg);
  margin-bottom: var(--space-lg);
  font-size: 16px;
  line-height: 1.6;
}

.info {
  display: flex;
  justify-content: space-around;
  margin-bottom: var(--space-lg);
  flex-wrap: wrap;
  gap: var(--space-md);
}

.stat-item {
  background: linear-gradient(135deg, var(--color-bg-elevated), var(--color-primary-light));
  padding: var(--space-sm) var(--space-md);
  border-radius: var(--radius-lg);
  border: 1px solid var(--color-primary);
  font-weight: 600;
}

#palabra {
  font-family: var(--font-display);
  font-size: 48px;
  letter-spacing: 12px;
  margin: var(--space-lg) 0;
  color: var(--color-text-primary);
  font-weight: 700;
  min-height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--color-bg-elevated), var(--color-green-light));
  border: 2px solid var(--color-green);
  border-radius: var(--radius-lg);
  padding: var(--space-md);
}

#pista {
  font-size: 18px;
  font-weight: 600;
  margin: var(--space-md) 0;
  color: var(--color-text-primary);
  background: linear-gradient(135deg, var(--color-bg-elevated), var(--color-ai-light));
  padding: var(--space-sm) var(--space-md);
  border-radius: var(--radius-lg);
  border: 2px solid var(--color-ai);
  margin-bottom: var(--space-lg);
}

#letras {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
  justify-content: center;
  margin: var(--space-lg) 0;
  padding: var(--space-md);
  background: linear-gradient(135deg, var(--color-bg-elevated), var(--color-green-light));
  border-radius: var(--radius-lg);
  border: 2px solid var(--color-green);
}

button {
  padding: var(--space-md) var(--space-lg);
  margin: var(--space-xs);
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
  background: var(--color-primary);
  color: var(--color-text-on-dark);
  border: 2px solid var(--color-primary-dark);
  border-radius: var(--radius-lg);
  transition: all var(--transition-base);
  min-width: 50px;
  min-height: 50px;
}

button:hover {
  background: var(--color-primary-dark);
  transform: translateY(-2px);
}

button:disabled {
  background: var(--color-text-secondary);
  cursor: not-allowed;
  transform: none;
}

.correcto {
  background: var(--color-green) !important;
  transform: scale(1.1);
}

.incorrecto {
  background: var(--color-rose) !important;
  transform: scale(0.9);
}

@media (max-width: 768px) {
  body {
    padding: var(--space-md);
  }
  
  .game-container {
    padding: var(--space-md);
  }
  
  h1 {
    font-size: 2rem;
  }
  
  #palabra {
    font-size: 32px;
    letter-spacing: 8px;
  }
  
  button {
    font-size: 16px;
    min-width: 45px;
    min-height: 45px;
  }
  
  .info {
    flex-direction: column;
    gap: var(--space-sm);
  }
}
</style>
</head>
<body>

<div class="game-container">
  <h1>🧠 Palabra Oculta</h1>
  
  <div class="descripcion">
    Este juego ayuda a desarrollar la <b>memoria</b>, el <b>lenguaje</b> y la <b>atención</b>. 
    Descubre la palabra oculta seleccionando las letras correctas.
  </div>

  <div class="info">
    <div class="stat-item">🏆 Nivel: <span id="nivel">1</span></div>
    <div class="stat-item">❤️ Vidas: <span id="vidas">6</span></div>
    <div class="stat-item">⭐ Puntos: <span id="puntos">0</span></div>
    <div class="stat-item">⏱️ Tiempo: <span id="tiempo">120</span></div>
  </div>

  <div id="palabra"></div>
  <div id="pista">💡 Pista: ???</div>
  <button onclick="mostrarPista()">💡 Mostrar pista</button>
  
  <div id="letras"></div>
  
  <button onclick="reiniciar()">🔄 Reiniciar juego</button>
</div>

<script>
// Palabras y pistas
const palabras = [
  {palabra: "PSICOLOGIA", pista: "Ciencia que estudia la mente y conducta"},
  {palabra: "MEMORIA", pista: "Capacidad de almacenar y recordar información"},
  {palabra: "EMOCION", pista: "Estado afectivo como alegría, tristeza o enojo"},
  {palabra: "PENSAMIENTO", pista: "Proceso mental de razonar o imaginar"},
  {palabra: "APRENDIZAJE", pista: "Proceso de adquirir conocimientos"},
  {palabra: "CONCIENCIA", pista: "Capacidad de reconocer la realidad"},
  {palabra: "PERSONALIDAD", pista: "Conjunto de rasgos que definen a una persona"},
  {palabra: "INTELIGENCIA", pista: "Capacidad mental para razonar y aprender"},
  {palabra: "CREATIVIDAD", pista: "Capacidad de generar ideas nuevas"},
  {palabra: "MOTIVACION", pista: "Impulso que dirige la conducta hacia metas"}
];

let palabraActual = "";
let pistaActual = "";
let mostrada = [];
let vidas = 6;
let puntos = 0;
let nivel = 1;
let tiempo = 120;
let intervalo;

function iniciar() {
  clearInterval(intervalo);
  
  // Seleccionar palabra aleatoria
  let indice = Math.floor(Math.random() * palabras.length);
  let dato = palabras[indice];
  
  palabraActual = dato.palabra;
  pistaActual = dato.pista;
  
  // Inicializar array con guiones
  mostrada = [];
  for(let i = 0; i < palabraActual.length; i++){
    mostrada.push("_");
  }
  
  // Resetear variables
  vidas = 6;
  tiempo = 120;
  
  // Actualizar interfaz
  document.getElementById("pista").textContent = "💡 Pista: ???";
  document.getElementById("nivel").textContent = nivel;
  document.getElementById("vidas").textContent = vidas;
  document.getElementById("puntos").textContent = puntos;
  document.getElementById("tiempo").textContent = tiempo;
  
  // Crear botones de letras
  crearLetras();
  
  // Actualizar palabra mostrada
  actualizarPalabra();
  
  // Iniciar temporizador
  intervalo = setInterval(() => {
    tiempo--;
    document.getElementById("tiempo").textContent = tiempo;
    
    if(tiempo <= 0){
      alert("⏰ Tiempo terminado. La palabra era: " + palabraActual);
      reiniciar();
    }
  }, 1000);
}

function crearLetras() {
  const letrasDiv = document.getElementById("letras");
  letrasDiv.innerHTML = "";
  
  const abecedario = "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ";
  
  for(let letra of abecedario){
    let btn = document.createElement("button");
    btn.textContent = letra;
    btn.onclick = function() {
      if(this.disabled) return;
      
      this.disabled = true;
      
      if(palabraActual.includes(letra)){
        // Letra correcta
        this.classList.add("correcto");
        
        // Reemplazar guiones por la letra
        for(let i = 0; i < palabraActual.length; i++){
          if(palabraActual[i] === letra){
            mostrada[i] = letra;
          }
        }
        
        puntos += 10;
        actualizarPalabra();
        
        // Verificar si se completó la palabra
        if(!mostrada.includes("_")){
          setTimeout(() => {
            alert("🎉 ¡Correcto! La palabra era: " + palabraActual + "\n⭐ Puntos: " + puntos);
            nivel++;
            iniciar();
          }, 500);
        }
      } else {
        // Letra incorrecta
        this.classList.add("incorrecto");
        vidas--;
        document.getElementById("vidas").textContent = vidas;
        
        if(vidas <= 0){
          alert("💀 Game Over. La palabra era: " + palabraActual);
          reiniciar();
        }
      }
      
      document.getElementById("puntos").textContent = puntos;
    };
    
    letrasDiv.appendChild(btn);
  }
}

function actualizarPalabra() {
  document.getElementById("palabra").textContent = mostrada.join(" ");
}

function mostrarPista() {
  document.getElementById("pista").textContent = "💡 Pista: " + pistaActual;
  puntos = Math.max(0, puntos - 5);
  document.getElementById("puntos").textContent = puntos;
}

function reiniciar() {
  nivel = 1;
  puntos = 0;
  iniciar();
}

// Iniciar juego al cargar la página
window.onload = function() {
  iniciar();
};
</script>

</body>
</html>
